<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PsicoGestor</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a8caf, #a3c4dc);
      color: #333;
    }

    .container {
      text-align: center;
      padding: 100px 20px;
    }

    h1 {
      font-size: 48px;
      color: white;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      color: #f0f0f0;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      background-color: white;
      color: #6a8caf;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 16px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>PsicoGestor</h1>
    <h2>Otimização da gestão em atendimentos psicológicos</h2>
    
    <a href="/login" class="btn">Acessar Sistema</a>
  </div>
</body>
</html>
