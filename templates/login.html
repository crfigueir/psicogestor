<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - PsicoGestor</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a8caf, #a3c4dc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      color: #6a8caf;
    }

    p {
      font-size: 14px;
      margin-bottom: 20px;
      color: #666;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #6a8caf;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #5a7a9a;
    }

    .cadastro {
      margin-top: 15px;
      font-size: 13px;
    }

    .cadastro a {
      color: #6a8caf;
      text-decoration: none;
      font-weight: bold;
    }

    .cadastro a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h1>PsicoGestor</h1>
    <p>Acesse sua conta</p>

    <form action="/login" method="POST">

      <input type="email" name="email" placeholder="E-mail" required>
      <input type="password" name="senha" placeholder="Senha" required>

      <button type="submit">Entrar</button>

    </form>

    <!-- 🔥 NOVO BOTÃO -->
    <div class="cadastro">
      Não tem conta?
      <a href="/cadastro_usuario">Cadastre-se</a>
    </div>

  </div>
</body>
</html>
